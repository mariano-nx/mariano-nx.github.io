        // Okta Configuration
        const oktaConfig = {

            clientId: "0oa10xxefj7fu3U9U698",

        // Initialize Okta
        const authClient = new OktaAuth(oktaConfig);

        let oktaTransactionStorage = window.sessionStorage.getItem("okta-transaction-storage");

        if (oktaTransactionStorage) {
            const storage = JSON.parse(oktaTransactionStorage);
            if (storage && Object.keys(storage).length) {

            }
        } // Closed the IF block properly here

        // 2. FIXED: Moved signIn() OUTSIDE the if block so the button can find it
        function signIn(){
            authClient.signInWithRedirect({
                originalUri: window.location.href,
                ...oktaConfig
            });
        }
