        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
        crossorigin="anonymous"></script>
        
    <script type="text/javascript" charset="utf-8">
        // 1. Initialize Genesys
        (function (g, e, n, es, ys) {
          g['_genesysJs'] = e;
          g[e] = g[e] || function () {
            (g[e].q = g[e].q || []).push(arguments)
          };
          g[e].t = 1 * new Date();
          g[e].c = es;
          ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; document.head.appendChild(ys);
        })(window, 'Genesys', 'https://apps.mypurecloud.com/genesys-bootstrap/genesys.min.js', {
          environment: 'use1',
          deploymentId: '09061e37-4f27-488b-bf4b-2fda4ee7bbf0'
        });

        // 2. Configure Okta
        const oktaConfig = {
            redirectUri: "https://mariano-nx.github.io/implicit/index.html",
            postLogoutRedirectUri: "https://mariano-nx.github.io/",
            clientId: "0oa10xxefj7fu3U9U698",
            issuer: "https://integrator-2892704.okta.com/oauth2/default",
            scopes: ['openid', 'email', 'profile'],
            pkce: false,
            responseType: ['id_token'],
            maxAge : 3600
        };
        const authClient = new OktaAuth(oktaConfig);

        // 3. Login Function (Properly outside of any IF blocks)
        function signIn(){
            authClient.signInWithRedirect({
                originalUri: window.location.href,
                ...oktaConfig
            });
        }

        // 4. Register Genesys AuthProvider
        Genesys('registerPlugin', 'AuthProvider', (AuthProvider) => {

            // Extract 'okta-oauth-nonce' cookie safely
            let nonce = null; 
            const cookieString = document.cookie;
			console.log(cookieString);
            
            if (cookieString.includes('okta-oauth-nonce=')) {
                // This finds the exact cookie by name and safely extracts the value
                nonce = cookieString
                    .split('; ')
                    .find(row => row.startsWith('okta-oauth-nonce='))
                    ?.split('=')[1];
            }
            
            

            // Get the URL parameters
            const urlParams = new URLSearchParams(window.location.search); 
            const idToken = new URLSearchParams(window.location.hash.substring(1)).get('id_token'); 
            const iss = urlParams.has('iss') ? urlParams.get('iss') : null;
            console.log(idToken);
            /* Register Command - mandatory */
            AuthProvider.registerCommand('getAuthCode', (e) => {
                e.resolve({
                    idToken: idToken,
                    redirectUri: "https://mariano-nx.github.io/implicit/index.html",
                    nonce: nonce,
                    maxAge: 3600
                });
            });

            AuthProvider.subscribe('Auth.authError', (error) => {
                console.log("Genesys Auth Error: ", error);
            });
            
            AuthProvider.ready();
        });
      </script>
</head>
